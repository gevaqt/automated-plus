name: Automated Pull Request

on:
  schedule:
    # Runs once daily at 08:30 Asia/Jakarta because GitHub cron uses UTC.
    - cron: '30 1 * * *'
  workflow_dispatch:
    inputs:
      timezone:
        description: Timezone used in the generated timestamp
        required: false
        default: Asia/Jakarta
      target_file:
        description: File to update in the pull request branch
        required: false
        default: AUTO_PR_STATUS.md
      base_branch:
        description: Branch that receives the pull request
        required: false
        default: main
      pr_branch:
        description: Automation branch used as the pull request head
        required: false
        default: automation/status-update
      pr_title:
        description: Pull request title
        required: false
        default: "chore: automated status update"
      commit_prefix:
        description: Commit message prefix
        required: false
        default: "chore: update automated PR status"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: automated-pr-${{ github.repository }}
  cancel-in-progress: true

env:
  TZ_NAME: "${{ github.event.inputs.timezone || 'Asia/Jakarta' }}"
  TARGET_FILE: "${{ github.event.inputs.target_file || 'AUTO_PR_STATUS.md' }}"
  BASE_BRANCH: "${{ github.event.inputs.base_branch || github.event.repository.default_branch || 'main' }}"
  PR_BRANCH: "${{ github.event.inputs.pr_branch || 'automation/status-update' }}"
  PR_TITLE: "${{ github.event.inputs.pr_title || 'chore: automated status update' }}"
  COMMIT_PREFIX: "${{ github.event.inputs.commit_prefix || 'chore: update automated PR status' }}"
  AUTHOR_NAME: "${{ vars.COMMIT_AUTHOR_NAME || github.actor }}"
  AUTHOR_EMAIL: "${{ vars.COMMIT_AUTHOR_EMAIL || format('{0}+{1}@users.noreply.github.com', github.actor_id, github.actor) }}"

jobs:
  create-or-update-pr:
    name: Create or update automation PR
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.BASE_BRANCH }}

      - name: Create or update pull request
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PR_TOKEN || github.token }}
        run: |
          set -euo pipefail

          base_branch="${BASE_BRANCH}"
          pr_branch="${PR_BRANCH}"
          target_file="${TARGET_FILE}"
          timezone="${TZ_NAME}"
          pr_title="${PR_TITLE}"
          commit_prefix="${COMMIT_PREFIX}"

          if [[ -z "${target_file}" || "${target_file}" == /* || "${target_file}" == *..* ]]; then
            echo "Invalid target_file: ${target_file}"
            exit 1
          fi

          if [[ -z "${base_branch}" || -z "${pr_branch}" || "${pr_branch}" == "${base_branch}" ]]; then
            echo "Invalid branch configuration."
            exit 1
          fi

          current_time="$(TZ="${timezone}" date '+%Y-%m-%d %H:%M:%S %Z')"
          run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          git checkout -B "${pr_branch}"
          mkdir -p "$(dirname "${target_file}")"

          {
            printf '# Automated PR Status\n\n'
            printf 'Last update: %s\n\n' "${current_time}"
            printf -- '- Repository: %s\n' "${GITHUB_REPOSITORY}"
            printf -- '- Base branch: %s\n' "${base_branch}"
            printf -- '- PR branch: %s\n' "${pr_branch}"
            printf -- '- Event: %s\n' "${GITHUB_EVENT_NAME}"
            printf -- '- Actor: %s\n' "${GITHUB_ACTOR}"
            printf -- '- Run: %s\n' "${run_url}"
            printf -- '- Source SHA: %s\n' "${GITHUB_SHA}"
          } > "${target_file}"

          if [[ -z "$(git status --porcelain -- "${target_file}")" ]]; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "${AUTHOR_NAME}"
          git config user.email "${AUTHOR_EMAIL}"

          git add "${target_file}"
          git commit -m "${commit_prefix}: ${current_time} [skip ci]"

          git fetch origin "${pr_branch}:refs/remotes/origin/${pr_branch}" || true
          git push --force-with-lease origin "HEAD:${pr_branch}"

          pr_body="$(mktemp)"
          {
            printf 'Automated PR generated by GitHub Actions.\n\n'
            printf -- '- Updated file: `%s`\n' "${target_file}"
            printf -- '- Generated at: %s\n' "${current_time}"
            printf -- '- Workflow run: %s\n' "${run_url}"
          } > "${pr_body}"

          existing_pr="$(gh pr list --base "${base_branch}" --head "${pr_branch}" --state open --json number --jq '.[0].number // empty')"

          if [[ -n "${existing_pr}" ]]; then
            gh pr edit "${existing_pr}" --title "${pr_title}" --body-file "${pr_body}"
            echo "Updated pull request #${existing_pr}."
          else
            gh pr create --base "${base_branch}" --head "${pr_branch}" --title "${pr_title}" --body-file "${pr_body}"
          fi
